# Clash Meta 基础配置模板
# 功能：防止 DNS 泄露，支持 fake-ip 模式
# 适用客户端：Clash Meta（mihomo 内核）

mixed-port: 7890
allow-lan: false
bind-address: '*'
mode: rule
log-level: info
ipv6: false

# ---------------------------------------------------------------
# DNS 防泄露核心配置
# ---------------------------------------------------------------
dns:
  enable: true
  ipv6: false
  
  # fake-ip 模式：Clash 不会把真实域名发给本地 DNS
  # 所有域名先返回一个假 IP，等流量进来再根据规则决定走代理还是直连
  # 这样 ISP/运营商完全看不到你在查什么域名
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  
  # 这些域名不使用 fake-ip，直接真实解析（系统功能必需）
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.localhost'
    - '+.stun.*.*'
    - '+.stun.*.*.*'
    - 'localhost.ptlogin2.qq.com'
    - 'lens.l.google.com'
    - '+.ntp.org.cn'
    - 'time.*.com'
    - 'time.*.gov'
    - 'time.*.edu.cn'
    - 'ntp.*.com'
    - '*.time.edu.cn'

  # 用于解析下面 DoH 服务器域名本身（必须是 IP，不能是域名）
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 国内域名走国内加密 DNS（DoH = DNS over HTTPS，查询内容加密）
  nameserver:
    - https://doh.pub/dns-query          # 腾讯 DoH
    - https://dns.alidns.com/dns-query   # 阿里 DoH

  # 国外域名走国外加密 DNS（通过代理隧道发出，彻底防泄露）
  fallback:
    - https://1.1.1.1/dns-query          # Cloudflare DoH
    - https://8.8.8.8/dns-query          # Google DoH
    - tls://1.1.1.1:853                  # Cloudflare DoT
    - tls://8.8.8.8:853                  # Google DoT

  # 判断标准：IP 不是国内 IP 的域名，走 fallback（国外）DNS 解析
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/8

  # 国外 DNS 查询通过代理发出，防止 DNS 查询本身泄露
  nameserver-policy:
    'geosite:cn': https://doh.pub/dns-query

# ---------------------------------------------------------------
# 以下内容由订阅转换后端自动填充，不需要手动修改
# ---------------------------------------------------------------
proxies:

proxy-groups:

rules:
